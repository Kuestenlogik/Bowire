# Barrier model for LogSanitizer.Strip(string?).
#
# Closes CodeQL alerts #1786-#1791 (cs/log-forging in
# BowireInterceptorMiddleware + BowireReverseProxyMiddleware). The
# helper strips CR + LF from any user-controlled value before it
# reaches an ILogger structured-param renderer — see
# src/Kuestenlogik.Bowire.Interceptor/LogSanitizer.cs.
#
# There is no `sanitizerModel` extensible predicate — CodeQL models
# sanitizers/validators via `barrierModel` (+ `barrierGuardModel`),
# introduced in CodeQL 2.25.2. `sanitizerModel` never resolved, which
# made `codeql resolve extensions-by-pack` fail fatally and took the
# whole C# analysis down.
#
# barrierModel 9-tuple for C#:
#   1. namespace   — Kuestenlogik.Bowire.Interceptor
#   2. type        — LogSanitizer
#   3. subtypes    — false (this class, not children)
#   4. name        — Strip
#   5. signature   — (System.String) — single-arg overload
#   6. ext         — "" (none)
#   7. output      — ReturnValue (taint stops at the sanitised result;
#                    the barrier sits on the OUTPUT, not the input, since
#                    Strip's own body taint-propagates through Replace)
#   8. kind        — log-injection (matches the cs/log-forging taint kind)
#   9. provenance  — manual (hand-written, not generated)
extensions:
  - addsTo:
      pack: codeql/csharp-all
      extensible: barrierModel
    data:
      - ["Kuestenlogik.Bowire.Interceptor", "LogSanitizer", false, "Strip", "(System.String)", "", "ReturnValue", "log-injection", "manual"]

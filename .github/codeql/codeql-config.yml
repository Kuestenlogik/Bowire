# CodeQL configuration for Bowire.
#
# Consumed by the advanced-setup workflow at .github/workflows/codeql.yml
# via `with: config-file: ./.github/codeql/codeql-config.yml`. GitHub's
# Default Setup ignores this file outright — that's why Bowire switched
# from Default Setup to Advanced Setup: the path filters below need to
# actually take effect.

name: "Bowire CodeQL config"

# These two files are build-time fragments for a concatenated JS
# bundle, not standalone scripts:
#
#   prologue.js opens an IIFE — `(function () { 'use strict'; …`
#   init.js     closes the same IIFE — `})();`
#
# An MSBuild step at compile-time concatenates every <BowireJsFragment>
# in `.csproj` into a single `wwwroot/bowire.js` that the runtime
# serves. Per-file the two fragments are syntactically incomplete
# (mismatched parens), which causes CodeQL's JavaScript extractor to
# raise "A parse error occurred: Unexpected token". The other
# `wwwroot/js/` files are valid standalone JS — they only contain
# function declarations, top-level `var`/`function` statements, etc.
# — so we keep them in scope so security queries (`auth.js`,
# `helpers.js`, `settings.js`, ...) still run.
paths-ignore:
  - 'src/Kuestenlogik.Bowire/wwwroot/js/prologue.js'
  - 'src/Kuestenlogik.Bowire/wwwroot/js/init.js'
  # Screenshot / debug / capture tooling for build + docs pipeline.
  # Talks to local Kestrel sample servers with self-signed dev certs
  # over loopback only (guarded by isLoopback checks). Not runtime
  # code, never reaches a remote host — so `js/disabling-certificate-
  # validation` findings here are noise.
  - 'scripts/**'

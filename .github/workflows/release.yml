name: Release

# Tag-driven full release pipeline. Push a `v*` tag → builds standalone
# binaries for 6 RIDs, MSI/DEB/RPM, multi-arch container, DocFX docs
# (HTML zip + custom-rendered PDF), then publishes everything to:
#   - GitHub Releases (all assets, all tags)
#   - GitHub Packages   (NuGets, every tag — RCs included)
#   - nuget.org         (NuGets, every tag, gated on NUGET_API_KEY; RCs
#                        show up as pre-release versions and only flow
#                        to consumers who opt in via `--prerelease`)
#   - GHCR              (multi-arch container, always on tag)
#   - Docker Hub        (multi-arch container, gated on DOCKERHUB_TOKEN)
#
# Job split:
#   - build-linux  (ubuntu-latest): NuGet pack, 6-RID publish + tar/zip
#                  archives, DEB/RPM via nfpm, DocFX HTML + custom PDF,
#                  container push, NuGet push.
#   - build-msi    (windows-latest): WiX MSI builds for win-x64 + win-arm64.
#                  WiX v5 is Windows-only (`warning WIX0000: WiX Toolset
#                  only supports Windows`), so the MSI step can't share
#                  the Linux runner. Runs in parallel.
#   - release      (ubuntu-latest, needs: [build-linux, build-msi]):
#                  downloads both artifact sets and creates the GitHub
#                  Release. Skipped on workflow_dispatch dry-runs.
#
# Hybrid signing-ready (Phase 3): today this ships unsigned binaries.
# Signing slots in as additional steps without restructuring:
#   - MSI signing → after each `Build MSI` step in build-msi, gated on
#     `secrets.WINDOWS_SIGN_CERT_BASE64 != ''`, runs signtool against
#     the .msi outputs (timestamped, sha256).
#   - macOS notarization → after `Archive standalone binaries` in
#     build-linux, gated on `secrets.APPLE_DEVELOPER_ID_CERT != ''`,
#     runs codesign + `xcrun notarytool submit --wait`.
#
# Manual `workflow_dispatch` trigger is enabled for dry runs without
# tagging — every build step exercises end-to-end, but container/NuGet
# push and the GitHub Release upload are gated to `tag` ref-type so a
# dispatch run never publishes anything.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

permissions:
  contents: write   # softprops/action-gh-release creates the GitHub Release
  packages: write   # nuget push to GitHub Packages + container push to GHCR

jobs:
  # ================================================================
  # build-linux: NuGets, RID archives, DEB/RPM, docs, container push
  # ================================================================
  build-linux:
    name: Build (Linux artefacts + container)
    runs-on: ubuntu-latest

    # Job-level env so optional secrets are visible in `if:` expressions
    # (the `secrets` context isn't available there directly). Empty
    # values when the secret isn't set, so `env.X != ''` gates work.
    env:
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      # Gate: refuse to ship a release that has no curated body. From
      # v2.0 onward the GitHub Release body (set via the UI or
      # `gh release create vX.Y.Z --draft --notes-file <path>` before
      # the tag fires) IS the source of truth for editorial content —
      # RELEASE_NOTES.md is generated by scripts/ci/generate-release-notes.mjs
      # and mirrors what the publish workflow ships. Failing here saves
      # ~20 min of build time + prevents the "shipped with placeholder
      # body, edit in post" pattern that bit v1.8.0. Skipped on
      # workflow_dispatch dry-runs.
      - name: Verify curated release notes
        if: ${{ github.ref_type == 'tag' }}
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          # Source-of-truth chain (from v2.1 onward):
          #   1) docs/release-notes/upcoming.md (file-driven, v2.1+ canonical path)
          #   2) docs/release-notes/${TAG}.md  (preserved past release body)
          #   3) Legacy: GitHub Draft Release body (v2.0 used this — fall back so
          #      tags pushed in the transition still publish)
          # The file-driven path keeps the Releases page free of Draft entries that
          # otherwise look like "v2.1 already exists" to users hitting that URL.
          FILE_BODY=""
          for candidate in "docs/release-notes/${TAG}.md" "docs/release-notes/upcoming.md"; do
            if [[ -f "$candidate" ]]; then
              # Strip any YAML front-matter so the body downstream is pure
              # markdown ready to land in the release body verbatim.
              FILE_BODY=$(awk 'BEGIN{fm=0} /^---$/{fm++; next} fm<2{next} {print}' "$candidate")
              FILE_BODY=$(echo "$FILE_BODY" | sed -E 's/<[^>]+>//g; /^[[:space:]]*$/d' | head -c 1)
              if [[ -n "$FILE_BODY" ]]; then
                FILE_BODY="present-at:${candidate}"
                break
              fi
              FILE_BODY=""
            fi
          done
          if [[ -n "$FILE_BODY" ]]; then
            echo "✓ Found curated block for ${TAG} (file: ${FILE_BODY#present-at:})"
            exit 0
          fi
          # Legacy fallback: GitHub Draft Release body.
          BODY=$(gh api "repos/${{ github.repository }}/releases/tags/${TAG}" --jq '.body' 2>/dev/null || true)
          if [[ -z "$BODY" ]]; then
            BODY=$(gh api "repos/${{ github.repository }}/releases" --jq ".[] | select(.tag_name == \"${TAG}\") | .body" 2>/dev/null | head -n 50000 || true)
          fi
          if [[ -z "$BODY" ]] || echo "$BODY" | grep -q "See the auto-generated change list below"; then
            echo "::error::No editorial body found for ${TAG}."
            echo ""
            echo "Curate the release body in the repo (preferred from v2.1):"
            echo "  edit docs/release-notes/upcoming.md, commit + push, then tag."
            echo ""
            echo "Or, legacy path (v2.0 compatible):"
            echo "  gh release create ${TAG} --repo ${{ github.repository }} --draft \\"
            echo "    --title '${TAG} — <theme>' --notes-file path/to/notes.md"
            echo ""
            echo "The publish step below promotes the file body or the draft."
            exit 1
          fi
          echo "✓ Found curated block for ${TAG} (legacy: GitHub Draft Release)"

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v6
        with:
          node-version: '20'

      # workflow_dispatch runs (no tag) get a synthetic version so the
      # build artefacts have a sensible filename. Tag pushes get the
      # tag name minus the leading `v`.
      - name: Extract version
        id: version
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=0.0.0-dispatch.${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT
          fi

      # ----------------------------------------------------------
      # NuGet packages
      # ----------------------------------------------------------

      - name: Restore
        run: dotnet restore Kuestenlogik.Bowire.slnx

      - name: Build & Test
        run: |
          dotnet build Kuestenlogik.Bowire.slnx -c Release --no-restore -p:Version=${{ steps.version.outputs.VERSION }}
          dotnet test Kuestenlogik.Bowire.slnx -c Release --no-build -v normal

      - name: Pack (NuGet)
        run: dotnet pack Kuestenlogik.Bowire.slnx -c Release --no-build -o artifacts/packages -p:Version=${{ steps.version.outputs.VERSION }}

      # Quick-download bundle: every official Küstenlogik NuGet for
      # this release, zipped into a single asset. Saves consumers
      # who want offline-install (air-gapped CI, embedded host setup)
      # from clicking through 15 individual .nupkg downloads on the
      # release page. The marketing-site download dropdown links the
      # unversioned alias `bowire-nugets.zip`; the versioned name
      # alongside lets consumers pin a release.
      - name: Bundle NuGets into one ZIP
        env:
          V: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p publish/archives
          cd artifacts/packages
          zip -q "../../publish/archives/bowire-nugets-$V.zip" *.nupkg
          cd ../..
          cp "publish/archives/bowire-nugets-$V.zip" publish/archives/bowire-nugets.zip
          ls -lh publish/archives/bowire-nugets*.zip

      # ----------------------------------------------------------
      # Standalone binaries (Linux / Windows / macOS × x64 / arm64)
      # ----------------------------------------------------------

      - name: Publish standalone binaries (6 RIDs)
        env:
          V: ${{ steps.version.outputs.VERSION }}
        run: |
          for rid in linux-x64 linux-arm64 win-x64 win-arm64 osx-x64 osx-arm64; do
            dotnet publish src/Kuestenlogik.Bowire.Tool \
              -c Release -r "$rid" --self-contained \
              -o "publish/bowire-$rid" \
              -p:Version=$V
          done

      # tar.gz for unix-y RIDs, zip for Windows. Filenames match what
      # the marketing-site download dropdown links to via
      # `releases/latest/download/<name>` — keep these stable.
      - name: Archive standalone binaries
        run: |
          mkdir -p publish/archives
          cd publish
          for rid in linux-x64 linux-arm64 osx-x64 osx-arm64; do
            tar czf "archives/bowire-$rid.tar.gz" "bowire-$rid"
          done
          for rid in win-x64 win-arm64; do
            zip -qr "archives/bowire-$rid.zip" "bowire-$rid"
          done

      # Phase 3 macOS notarization hook would slot in here:
      #   if: ${{ secrets.APPLE_DEVELOPER_ID_CERT != '' }}
      #   - codesign --deep --sign "$APPLE_DEV_ID" publish/bowire-osx-*/bowire
      #   - xcrun notarytool submit publish/archives/bowire-osx-*.tar.gz --wait

      # ----------------------------------------------------------
      # DEB + RPM via nfpm (x64 + arm64)
      # ----------------------------------------------------------

      - name: Install nfpm (latest)
        run: |
          NFPM_URL=$(curl -fsSL https://api.github.com/repos/goreleaser/nfpm/releases/latest \
              | jq -r '.assets[] | select(.name | endswith("Linux_x86_64.tar.gz")) | .browser_download_url')
          echo "Downloading nfpm from $NFPM_URL"
          curl -fsSL "$NFPM_URL" | sudo tar -xz -C /usr/local/bin nfpm
          nfpm --version

      # nfpm's built-in env substitution only covers a fixed set of
      # top-level fields (Name, Version, Arch, Maintainer, etc.) — not
      # `contents.src`. We pre-expand the yaml with envsubst so PUBLISH_DIR
      # lands in the right place. gettext-base (and thus envsubst) is
      # pre-installed on ubuntu-latest.
      - name: Build DEB + RPM (x64)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          ARCH: amd64
          PUBLISH_DIR: publish/bowire-linux-x64
        run: |
          envsubst < packaging/linux/nfpm.yaml > /tmp/nfpm-x64.yaml
          nfpm pkg --packager deb --target "publish/archives/bowire_${VERSION}_amd64.deb"  --config /tmp/nfpm-x64.yaml
          nfpm pkg --packager rpm --target "publish/archives/bowire-${VERSION}.x86_64.rpm" --config /tmp/nfpm-x64.yaml
          # Unversioned aliases for the marketing-site download links.
          cp "publish/archives/bowire_${VERSION}_amd64.deb"    publish/archives/bowire_amd64.deb
          cp "publish/archives/bowire-${VERSION}.x86_64.rpm"   publish/archives/bowire.x86_64.rpm

      - name: Build DEB + RPM (arm64)
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          ARCH: arm64
          PUBLISH_DIR: publish/bowire-linux-arm64
        run: |
          envsubst < packaging/linux/nfpm.yaml > /tmp/nfpm-arm64.yaml
          nfpm pkg --packager deb --target "publish/archives/bowire_${VERSION}_arm64.deb"   --config /tmp/nfpm-arm64.yaml
          nfpm pkg --packager rpm --target "publish/archives/bowire-${VERSION}.aarch64.rpm" --config /tmp/nfpm-arm64.yaml

      # ----------------------------------------------------------
      # Documentation: HTML site (zip) + custom-rendered PDF
      # ----------------------------------------------------------

      - name: Install DocFX
        run: dotnet tool install -g docfx

      - name: Build standalone documentation (HTML)
        run: docfx docs/docfx.standalone.json

      - name: Install Node deps for PDF builder
        run: npm ci || npm install

      # Custom Playwright-driven renderer (scripts/site/build-docs-pdf.js).
      # Replaces the previous `docfx pdf` call which was flaky because
      # it auto-installed Chromium on first use without a deterministic
      # path. The script walks the rendered HTML tree, opens each page
      # in headless Chromium, and merges per-page PDFs via pdf-lib.
      - name: Install Playwright Chromium
        run: npx --yes playwright install chromium --with-deps

      - name: Build documentation PDF
        run: node scripts/site/build-docs-pdf.js

      - name: Archive documentation (zip + tar.gz + versioned PDF alias)
        env:
          V: ${{ steps.version.outputs.VERSION }}
        run: |
          cd artifacts/docs-standalone
          zip -qr "../../publish/archives/bowire-docs-$V.zip" .
          tar czf "../../publish/archives/bowire-docs-$V.tar.gz" .
          cd ../..
          # Marketing-site links use the unversioned name; the versioned
          # copies let consumers pin to a release.
          cp publish/archives/bowire-docs-$V.zip    publish/archives/bowire-docs.zip
          cp publish/archives/bowire-docs-$V.tar.gz publish/archives/bowire-docs.tar.gz
          cp publish/archives/bowire-docs.pdf       publish/archives/bowire-docs-$V.pdf

      # ----------------------------------------------------------
      # Multi-arch container → GHCR (always) + Docker Hub (optional)
      # ----------------------------------------------------------
      # Tool csproj has the full container config (base image, port,
      # OCI labels, repo). `dotnet publish /t:PublishContainer` builds
      # both arches in a single call when ContainerRuntimeIdentifiers
      # is supplied as a semicolon-separated list. Both pushes happen
      # only on tag refs — dispatch runs would otherwise produce
      # `0.0.0-dispatch.N`-tagged images on GHCR.

      - name: Login to GHCR
        if: ${{ github.ref_type == 'tag' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ContainerImageTags carries a `;`-separated list. Bash strips the
      # outer double-quotes and dotnet then sees the `;` as an
      # argument separator (`MSB1006: Property is not valid. Switch:
      # latest`). Escape the inner quotes so they reach MSBuild
      # literally as the value delimiter.
      #
      # The pre-restore is needed because `ContainerRuntimeIdentifiers`
      # makes publish call into the project once per RID, but the
      # solution-level restore at the top of the job only resolved the
      # host RID. Without the explicit multi-RID restore here, the
      # container publish fails with `NETSDK1047: Assets file ...
      # doesn't have a target for 'net10.0/linux-arm64'`.
      - name: Push container to GHCR (multi-arch)
        if: ${{ github.ref_type == 'tag' }}
        env:
          V: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet restore src/Kuestenlogik.Bowire.Tool \
            "-p:RuntimeIdentifiers=\"linux-x64;linux-arm64\""
          dotnet publish src/Kuestenlogik.Bowire.Tool \
            -c Release \
            -t:PublishContainer \
            --no-restore \
            -p:Version=$V \
            "-p:ContainerRuntimeIdentifiers=\"linux-x64;linux-arm64\"" \
            "-p:ContainerImageTags=\"$V;latest\"" \
            -p:ContainerRegistry=ghcr.io

      - name: Login to Docker Hub
        if: ${{ github.ref_type == 'tag' && env.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      # GHCR step above already restored the multi-RID assets, so the
      # `--no-restore` here re-uses that work — second container
      # publish is just the additional registry push, image is the
      # same artefact.
      - name: Push container to Docker Hub (multi-arch)
        if: ${{ github.ref_type == 'tag' && env.DOCKERHUB_TOKEN != '' }}
        env:
          V: ${{ steps.version.outputs.VERSION }}
        run: |
          dotnet publish src/Kuestenlogik.Bowire.Tool \
            -c Release \
            -t:PublishContainer \
            --no-restore \
            -p:Version=$V \
            "-p:ContainerRuntimeIdentifiers=\"linux-x64;linux-arm64\"" \
            "-p:ContainerImageTags=\"$V;latest\"" \
            -p:ContainerRegistry=docker.io

      # ----------------------------------------------------------
      # Publish NuGets (GitHub Packages + nuget.org)
      # ----------------------------------------------------------
      # Every tag publishes to both feeds, RCs included. SemVer's
      # `-rc.N` suffix marks them as pre-release, so consumers only
      # receive them on an explicit opt-in (`--prerelease` flag or a
      # pinned `Version="1.1.0-rc.3"`). The stable restore path is
      # untouched. (workflow_dispatch dry runs still skip — the gate
      # is on `github.ref_type == 'tag'`.)

      - name: Publish to GitHub Packages
        if: ${{ github.ref_type == 'tag' }}
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source "https://nuget.pkg.github.com/Kuestenlogik/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      - name: Publish to nuget.org
        if: ${{ github.ref_type == 'tag' && env.NUGET_API_KEY != '' }}
        run: dotnet nuget push "artifacts/packages/*.nupkg" --source https://api.nuget.org/v3/index.json --api-key "${{ env.NUGET_API_KEY }}" --skip-duplicate

      # nuget.org indexing-lag guard — the fix for the sibling NU1102 race.
      # `dotnet nuget push` returns the instant the upload is accepted, but
      # the flat-container / search index that `dotnet restore` reads lags
      # minutes-to-tens-of-minutes behind. If we dispatch the cascade right
      # away, every sibling's restore (its dep-bump PR CI *and* its own
      # release.yml) can fail with
      #   NU1102: Unable to find package Kuestenlogik.Bowire (>= <new>)
      # and the sibling release then has to be re-triggered by hand once
      # indexing catches up. So block here until the just-published version
      # is actually resolvable on nuget before fanning the cascade out —
      # fixes the race once, at the source, for every current + future
      # sibling. (The contract package Kuestenlogik.Bowire is what siblings
      # reference and what NU1102'd; the sibling NuGets push together and
      # index alongside it, so gating on the contract package is enough.)
      - name: Wait for nuget.org to index the release
        if: ${{ github.ref_type == 'tag' && env.NUGET_API_KEY != '' }}
        env:
          NEW_V: ${{ steps.version.outputs.VERSION }}
        run: |
          url="https://api.nuget.org/v3-flatcontainer/kuestenlogik.bowire/index.json"
          deadline=$(( SECONDS + 2400 ))   # 40-minute ceiling
          attempt=0
          # Cache-bust each poll so a CDN edge doesn't keep serving a
          # pre-publish copy of the version list.
          until curl -fsSL -H 'Cache-Control: no-cache' "${url}?t=${SECONDS}" \
                | tr ',' '\n' | grep -q "\"${NEW_V}\""; do
            if [ "$SECONDS" -ge "$deadline" ]; then
              echo "::warning::Kuestenlogik.Bowire $NEW_V still not indexed after 40 min — dispatching anyway."
              break
            fi
            attempt=$((attempt + 1))
            echo "  not indexed yet (attempt $attempt) — waiting 20s for nuget to resolve $NEW_V…"
            sleep 20
          done
          echo "nuget.org resolves Kuestenlogik.Bowire $NEW_V — safe to dispatch the cascade."

      # Fan a `bowire-released` repository_dispatch out to every sibling
      # repo that consumes Kuestenlogik.Bowire. The sibling list is
      # *discovered dynamically* by querying the Kuestenlogik org for
      # repos carrying the `bowire-cascade` GitHub topic -- so adding
      # a new sibling to the cascade is opt-in via that repo's own
      # Settings -> Topics, no PR against this workflow required.
      #
      # Each sibling has bowire-released.yml listening for this event
      # (see .github/sibling-templates/). The dispatch bumps the
      # sibling's PackageVersion + opens a PR; the PR's CI gates the
      # auto-merge and the auto-tag of the sibling's own next version.
      # Versioning is intentionally async -- siblings tag whatever's
      # next for them.
      - name: Dispatch to sibling repos
        if: ${{ github.ref_type == 'tag' && env.NUGET_API_KEY != '' }}
        env:
          GH_TOKEN: ${{ secrets.BOWIRE_DISPATCH_TOKEN }}
          NEW_V: ${{ steps.version.outputs.VERSION }}
        run: |
          siblings=$(gh api 'orgs/Kuestenlogik/repos?per_page=100' --paginate \
            --jq '.[] | select(.topics | index("bowire-cascade")) | .name')
          if [ -z "$siblings" ]; then
            echo "::warning::No repos tagged bowire-cascade -- cascade skipped."
            exit 0
          fi
          echo "Discovered siblings:"
          echo "$siblings" | sed 's/^/  /'
          echo
          while IFS= read -r repo; do
            [ -z "$repo" ] && continue
            echo "→ Dispatching bowire-released v$NEW_V to Kuestenlogik/$repo"
            gh api "repos/Kuestenlogik/$repo/dispatches" \
              --method POST \
              -f event_type=bowire-released \
              -f "client_payload[version]=$NEW_V" \
              || echo "  (dispatch failed for $repo -- skipping, not fatal)"
          done <<< "$siblings"

      # ----------------------------------------------------------
      # Hand artefacts off to the release job
      # ----------------------------------------------------------

      - name: Upload Linux artefacts
        uses: actions/upload-artifact@v7
        with:
          name: artefacts-linux
          path: |
            artifacts/packages/
            publish/archives/
          retention-days: 1

  # ================================================================
  # build-msi: WiX MSI builds (Windows-only)
  # ================================================================
  build-msi:
    name: Build (Windows MSI)
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Extract version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=0.0.0-dispatch.${GITHUB_RUN_NUMBER}" >> $GITHUB_OUTPUT
          fi

      # Self-contained publish for the two Windows arches feeds the
      # Files harvest in Bowire.wxs. Linux and macOS RIDs are skipped
      # here — the Linux job already produces those.
      - name: Publish standalone binaries (Windows RIDs)
        shell: bash
        env:
          V: ${{ steps.version.outputs.VERSION }}
        run: |
          for rid in win-x64 win-arm64; do
            dotnet publish src/Kuestenlogik.Bowire.Tool \
              -c Release -r "$rid" --self-contained \
              -o "publish/bowire-$rid" \
              -p:Version=$V
          done

      # Pinned to v5: WiX v7 added an OSMF EULA gate that blocks
      # `wix build` until accepted (`error WIX7015`). v5 is the last
      # major without the gate and is feature-complete for our needs.
      # WiX v5 is Windows-only (`warning WIX0000: WiX Toolset only
      # supports Windows`), which is why this entire job runs on
      # windows-latest instead of sharing the Linux runner.
      - name: Install WiX (v5)
        shell: bash
        run: dotnet tool install --global wix --version '5.*'

      # PublishDir must be absolute — WiX resolves the `-d` value
      # relative to the .wxs file's directory, not the working
      # directory of the wix invocation. Without `$GITHUB_WORKSPACE/`
      # in front, WiX silently writes a 1.5 MB MSI containing only
      # the WiX metadata and an empty Files harvest.
      - name: Build MSI (x64)
        shell: bash
        env:
          V: ${{ steps.version.outputs.VERSION }}
        run: |
          mkdir -p publish/archives
          wix build packaging/msi/Bowire.wxs \
            -arch x64 \
            -d Version=$V \
            -d "PublishDir=${GITHUB_WORKSPACE}/publish/bowire-win-x64" \
            -o "publish/archives/Bowire-$V-x64.msi"
          # Phase 3 signing hook would slot in here:
          #   if: ${{ secrets.WINDOWS_SIGN_CERT_BASE64 != '' }}
          #   echo "$WINDOWS_SIGN_CERT_BASE64" | base64 -d > /tmp/cert.pfx
          #   signtool sign /f /tmp/cert.pfx /p "$WINDOWS_SIGN_CERT_PWD" \
          #       /tr http://timestamp.digicert.com /td sha256 /fd sha256 \
          #       publish/archives/Bowire-$V-x64.msi
          cp "publish/archives/Bowire-$V-x64.msi" publish/archives/bowire-x64.msi

      - name: Build MSI (arm64)
        shell: bash
        env:
          V: ${{ steps.version.outputs.VERSION }}
        run: |
          wix build packaging/msi/Bowire.wxs \
            -arch arm64 \
            -d Version=$V \
            -d "PublishDir=${GITHUB_WORKSPACE}/publish/bowire-win-arm64" \
            -o "publish/archives/Bowire-$V-arm64.msi"
          cp "publish/archives/Bowire-$V-arm64.msi" publish/archives/bowire-arm64.msi

      # Drop the wix debug PDBs — they're build-side debugging artefacts,
      # not consumer downloads. Without this they otherwise ride along
      # because the upload-artifact path is `publish/archives/` glob.
      - name: Strip WiX debug symbols
        shell: bash
        run: rm -f publish/archives/*.wixpdb

      - name: Upload MSI artefacts
        uses: actions/upload-artifact@v7
        with:
          name: artefacts-msi
          path: publish/archives/
          retention-days: 1

  # ================================================================
  # release: download both artefact sets, create the GitHub Release
  # ================================================================
  # Skipped on workflow_dispatch dry-runs — only fires on tag pushes.
  # build-linux already pushed the container + NuGets; this job is
  # purely about assembling the GitHub Release.
  release:
    name: GitHub Release
    needs: [build-linux, build-msi]
    if: ${{ github.ref_type == 'tag' }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          # We only need RELEASE_NOTES.md, but checkout@v6 doesn't have
          # a sparse-checkout shorthand; full clone is fine here, the
          # release job has nothing else to do.
          fetch-depth: 1

      - name: Download Linux artefacts
        uses: actions/download-artifact@v8
        with:
          name: artefacts-linux
          path: ./

      - name: Download MSI artefacts
        uses: actions/download-artifact@v8
        with:
          name: artefacts-msi
          path: publish/archives/

      # Pull the editorial body straight off the existing GitHub draft
      # release (the source of truth from v2.0 onward) and write it
      # into release-body.md. softprops/action-gh-release with
      # `body_path` + `generate_release_notes: true` prepends the file's
      # content above the auto-gen 'What's Changed' list. A horizontal
      # rule + hint line frame the seam between curated highlights and
      # auto-gen commit list so the two sections read as separate
      # blocks rather than one wall.
      - name: Pull editorial body (file first, GitHub draft as fallback)
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          NOTES=""
          # Source chain matches the gate above: docs/release-notes/${TAG}.md
          # → docs/release-notes/upcoming.md → GitHub draft release body.
          for candidate in "docs/release-notes/${TAG}.md" "docs/release-notes/upcoming.md"; do
            if [[ -f "$candidate" ]]; then
              # Strip YAML front-matter; the body downstream is pure
              # markdown that lands as-is in the release.
              CANDIDATE_BODY=$(awk 'BEGIN{fm=0} /^---$/{fm++; next} fm<2{next} {print}' "$candidate")
              # Placeholder detection: a release-notes file is "real"
              # only when it carries at least one `### <heading>` —
              # i.e. a populated Highlights / Breaking subsection.
              # Stripping single-line `<…>` left multi-line HTML
              # comments + bare `## Highlights` headings behind so the
              # 2.1 upcoming.md template was indistinguishable from a
              # filled-in body, and shipped instead of the v2.0.0
              # curated content (root-cause documented in v2.0.0.md's
              # commit). Counting `###` lines is a stricter signal
              # that survives template noise.
              SECTION_COUNT=$(echo "$CANDIDATE_BODY" | grep -cE '^### ' || true)
              if [[ "${SECTION_COUNT:-0}" -gt 0 ]]; then
                NOTES="$CANDIDATE_BODY"
                echo "Using editorial body from ${candidate} (${SECTION_COUNT} section(s))"
                break
              else
                echo "Skipping ${candidate} — no ### subsections detected (treated as placeholder)."
              fi
            fi
          done
          if [[ -z "$NOTES" ]]; then
            # Drafts don't show up under /releases/tags/$TAG; list all
            # releases and grep by tag_name.
            NOTES=$(gh api "repos/${{ github.repository }}/releases" \
              --jq ".[] | select(.tag_name == \"${TAG}\") | .body" 2>/dev/null || true)
            [[ -n "$NOTES" ]] && echo "Using editorial body from GitHub draft release (legacy)."
          fi
          {
            if [[ -z "$NOTES" ]]; then
              echo "## $TAG"
              echo ""
              echo "_See the auto-generated change list below._"
            else
              echo "$NOTES"
            fi
            echo ""
            echo "---"
            echo ""
            echo "_The full commit list, contributors, and compare-URL diff are auto-generated below._"
            echo ""
          } > release-body.md
          echo "----- release-body.md -----"
          cat release-body.md
          echo "----- end -----"

      # Pull the release-title theme straight from the matching
      # milestone's title. Convention is documented in
      # docs/contributing/project-board.md — milestone titles carry
      # an optional `vX.Y[.Z] — <theme>` form, and we splice the
      # theme into the GitHub Release title so it reads vX.Y.Z —
      # <theme>.
      #
      # Lookup logic: strip the tag's `v` prefix, drop any pre-release
      # suffix (rc.N, beta), find the milestone whose title starts
      # with v<base> or v<major.minor> followed by either end-of-
      # string or the ` — ` separator. Empty / missing → bare title
      # so the pipeline doesn't crash on a half-set-up milestone.
      - name: Resolve release title from milestone
        id: title
        env:
          GH_TOKEN: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          BASE=$(echo "$VERSION" | sed -E 's/-.*$//')
          MAJ_MIN=$(echo "$BASE" | cut -d. -f1-2)
          MS_TITLES=$(gh api "repos/${{ github.repository }}/milestones?state=all&per_page=100" \
            --jq '.[].title' 2>/dev/null)
          THEME=""
          for candidate in "v${BASE}" "v${MAJ_MIN}"; do
            # Match the candidate at the start of a title, followed by
            # either end-of-string OR ` — <theme>` / ` - <theme>`.
            FULL=$(echo "$MS_TITLES" | grep -E "^${candidate}([[:space:]]+[—-][[:space:]]+.+)?$" | head -n 1)
            if [[ -n "$FULL" ]]; then
              # Strip everything up to and including the ` — ` separator
              # to isolate the theme. If the title is bare (no theme),
              # the strip leaves the version itself and we treat the
              # theme as empty.
              CANDIDATE_THEME=$(echo "$FULL" | sed -E "s/^${candidate}[[:space:]]+[—-][[:space:]]+//; t; d")
              if [[ -n "$CANDIDATE_THEME" ]]; then
                THEME="$CANDIDATE_THEME"
                echo "Resolved theme from milestone '${FULL}': ${THEME}"
                break
              fi
            fi
          done
          if [[ -n "$THEME" ]]; then
            echo "title=${TAG} — ${THEME}" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::No theme found on milestone matching v${BASE} or v${MAJ_MIN} — release title will be bare ${TAG}."
            echo "title=${TAG}" >> "$GITHUB_OUTPUT"
          fi

      # Token preference: RELEASE_PAT first, GITHUB_TOKEN fallback.
      # GitHub's anti-recursion rule means events fired by the default
      # GITHUB_TOKEN do NOT trigger other workflows — that's why the
      # winget workflow's `release: published` trigger sat silent on
      # v1.0.12. A user-owned PAT (fine-grained, scope: contents:write
      # + actions:write on this repo) does fire downstream events, so
      # winget.yml auto-runs after the release lands. Without the PAT
      # the release still gets created cleanly via GITHUB_TOKEN; the
      # downstream workflow then needs a manual workflow_dispatch.
      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3
        with:
          token: ${{ secrets.RELEASE_PAT || secrets.GITHUB_TOKEN }}
          name: ${{ steps.title.outputs.title }}
          body_path: release-body.md
          generate_release_notes: true
          prerelease: ${{ contains(github.ref, '-rc') }}
          # Auto-create a linked Discussion in the Announcements category for
          # every full release, so releases surface on GitHub Discussions (not
          # just Discord). Skipped for -rc prereleases to avoid announcement
          # noise — an empty category name tells the action not to create one.
          discussion_category_name: ${{ contains(github.ref, '-rc') && '' || 'Announcements' }}
          files: |
            artifacts/packages/*.nupkg
            publish/archives/*

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - uses: actions/setup-node@v7
        with:
          node-version: '22'

      # #356 — the frontend is vanilla JS run through node:test; these
      # gate the build so a stale fragment path or a broken pure helper
      # fails CI instead of rotting silently (they weren't wired in
      # before, which is how benchmarks.test.mjs drifted to a moved
      # path). No npm install needed — the harness is dependency-free.
      - name: JS unit tests
        run: node --test tests/Kuestenlogik.Bowire.Tests/wwwroot-js/*.test.mjs

      - name: Determine version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "VERSION=0.9.4-ci.${COMMIT_COUNT}.${SHORT_SHA}" >> $GITHUB_ENV

      - name: Restore
        run: dotnet restore Kuestenlogik.Bowire.slnx

      - name: Build
        run: dotnet build Kuestenlogik.Bowire.slnx -c Release --no-restore -p:Version=$VERSION

      - name: Test
        # XPlat Code Coverage drops one coverage.cobertura.xml per test
        # project under artifacts/coverage/raw/<guid>/. We merge them in
        # the next step before uploading — Codecov's server-side merge
        # de-duplicates by file but doesn't union per-line hits across
        # sessions, which under-counts lines that one project covers
        # while another one doesn't (~6 pp gap measured on this repo).
        #
        # --filter "Category!=Docker" skips the Testcontainers-backed
        # integration suites (NATS / Pulsar live-broker round-trips).
        # They're tagged [Trait("Category","Docker")] precisely so they
        # opt out here: the hosted runner's Docker Hub pulls are
        # rate-limited / flaky (manifest fetch for nats:2-alpine fails
        # intermittently), and these tests are meant for local / dev
        # runs with a working Docker daemon. The pure-unit + in-process
        # integration tests still run and gate the build.
        run: >
          dotnet test Kuestenlogik.Bowire.slnx -c Release --no-build -v normal
          --filter "Category!=Docker"
          --collect:"XPlat Code Coverage"
          --results-directory artifacts/coverage/raw

      - name: Merge coverage reports
        # ReportGenerator union-merges per-line hits across all input
        # files into one Cobertura output. Filters mirror codecov.yml's
        # `ignore` list so the merged file already excludes obj/, bin/,
        # wwwroot/, tests/, samples/, benchmarks/. We then delete the
        # raw per-test-project files so Codecov's auto-search only
        # finds the merged one — `files:` alone doesn't suppress the
        # auto-search, it only adds explicit picks on top.
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          reportgenerator \
            -reports:'artifacts/coverage/raw/*/coverage.cobertura.xml' \
            -targetdir:artifacts/coverage/merged \
            -reporttypes:Cobertura \
            -filefilters:'-**/obj/**;-**/wwwroot/**;-**/bin/**;-tests/**;-samples/**;-benchmarks/**'
          rm -rf artifacts/coverage/raw

      - name: Upload coverage to Codecov
        # Skip when running on a fork PR — Codecov tokenless uploads
        # work on push events but the secret isn't injected into PRs
        # from forks, so the upload would fail noisily for outside
        # contributors.
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: artifacts/coverage/merged/Cobertura.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Pack
        run: dotnet pack Kuestenlogik.Bowire.slnx -c Release --no-build -o artifacts/packages -p:Version=$VERSION

      # CI artefacts are uploaded for inspection but NOT published to
      # any feed — release.yml owns the publish path on tag push.
      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "VERSION=0.9.4-ci.${COMMIT_COUNT}.${SHORT_SHA}" >> $GITHUB_ENV

      - name: Restore
        run: dotnet restore Kuestenlogik.Bowire.slnx

      - name: Build
        run: dotnet build Kuestenlogik.Bowire.slnx -c Release --no-restore -p:Version=$VERSION

      - name: Test
        # XPlat Code Coverage drops one coverage.cobertura.xml per test
        # project under artifacts/coverage/<guid>/. codecov/codecov-action
        # globs them up directly — no merge step needed on our side.
        run: >
          dotnet test Kuestenlogik.Bowire.slnx -c Release --no-build -v normal
          --collect:"XPlat Code Coverage"
          --results-directory artifacts/coverage

      - name: Upload coverage to Codecov
        # Skip when running on a fork PR — Codecov tokenless uploads
        # work on push events but the secret isn't injected into PRs
        # from forks, so the upload would fail noisily for outside
        # contributors.
        if: ${{ !github.event.pull_request.head.repo.fork }}
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          directory: artifacts/coverage
          files: '**/coverage.cobertura.xml'
          flags: unittests
          fail_ci_if_error: false

      - name: Pack
        run: dotnet pack Kuestenlogik.Bowire.slnx -c Release --no-build -o artifacts/packages -p:Version=$VERSION

      # CI artefacts are uploaded for inspection but NOT published to
      # any feed — release.yml owns the publish path on tag push.
      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg

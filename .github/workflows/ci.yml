name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_NOLOGO: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Determine version
        run: |
          COMMIT_COUNT=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          echo "VERSION=0.9.4-ci.${COMMIT_COUNT}.${SHORT_SHA}" >> $GITHUB_ENV

      - name: Restore
        run: dotnet restore Kuestenlogik.Bowire.slnx

      - name: Build
        run: dotnet build Kuestenlogik.Bowire.slnx -c Release --no-restore -p:Version=$VERSION

      - name: Test
        run: dotnet test Kuestenlogik.Bowire.slnx -c Release --no-build -v normal

      - name: Pack
        run: dotnet pack Kuestenlogik.Bowire.slnx -c Release --no-build -o artifacts/packages -p:Version=$VERSION

      # CI artefacts are uploaded for inspection but NOT published to
      # any feed — release.yml owns the publish path on tag push.
      - name: Upload packages
        uses: actions/upload-artifact@v7
        with:
          name: nuget-packages
          path: artifacts/packages/*.nupkg

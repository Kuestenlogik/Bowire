name: CodeQL

# Advanced Setup CodeQL analysis. Replaces GitHub's Default Setup
# because the Default Setup ignores .github/codeql/codeql-config.yml
# — we need the path-filters in that file to honour:
#   - prologue.js / init.js   : standalone-incomplete IIFE fragments
#                              (they're concatenated at build time)
#   - scripts/**              : screenshot + debug tooling that talks
#                              to localhost-only TLS sample servers
#
# Switching: GitHub Repo Settings → Code security → Code scanning →
# CodeQL analysis: pick "Set up Advanced" (this workflow runs from
# then on) and disable the existing Default Setup row.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Weekly cron so model / query-set updates surface even if no push
  # lands during the week.
  schedule:
    - cron: '17 6 * * 1'

permissions:
  security-events: write
  packages: read
  actions: read
  contents: read

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        include:
          # C# build via dotnet — autobuild handles solution + project
          # discovery. If autobuild ever fails (rare for this repo)
          # swap to build-mode: manual + a `dotnet build` step.
          - language: csharp
            build-mode: autobuild
          # JS / TS extractor scans source directly, no build needed.
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up .NET
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          # Path-filters live in this file. Default Setup would
          # have ignored it; Advanced Setup honours it.
          config-file: ./.github/codeql/codeql-config.yml

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:${{ matrix.language }}

# Codecov configuration — keeps the coverage signal honest.
# https://docs.codecov.com/docs/codecovyml-reference

coverage:
  status:
    project:
      default:
        # Don't fail the check on small dips; we tolerate a 1 % regression
        # before flagging. Hard floors live on individual flags below.
        target: auto
        threshold: 1%
    patch:
      default:
        # New code on a PR should hit at least this much coverage to
        # pass the patch check. Tolerates the no-tests-for-DTOs cases.
        target: 70%
        threshold: 5%

comment:
  layout: "reach, diff, flags, files"
  behavior: default
  require_changes: true

ignore:
  - "**/Migrations/**"
  - "**/*.Designer.cs"
  - "**/Generated/**"
  - "**/obj/**"
  - "**/bin/**"
  - "tests/**"
  - "samples/**"
  - "benchmarks/**"
  - "src/**/wwwroot/**"
  - "scripts/**"

parsers:
  # Count Cobertura branch-partials (lines with `if (a || b)` where only
  # one branch is exercised) as full hits — matches the convention every
  # other coverage tool uses. Without this, Codecov reports a coverage
  # number that's ~5–6 pts pessimistic vs. ReportGenerator's line-rate
  # because the ~700 partials sit in the denominator but not the
  # numerator. With `partials_as_hits`, Codecov shows the same number
  # as `dotnet test --collect:"XPlat Code Coverage"` does locally.
  cobertura:
    partials_as_hits: true

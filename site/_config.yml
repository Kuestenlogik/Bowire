title: Bowire
description: The multi-protocol API workbench. Auto-discovers gRPC / REST / GraphQL / MQTT / SignalR / WebSocket / SSE / MCP / OData services and gives you a single browser UI to inspect, invoke, stream, mock, and replay them — embedded in your app or as a standalone CLI.
url: "https://bowire.io"
baseurl: ""

# Used by jekyll-seo-tag to emit og:image / twitter:card image, and by
# the Bowire brand wrapper everywhere else (about page, footer, etc.).
image: /assets/images/og-image.png
twitter:
  card: summary_large_image
markdown: kramdown
kramdown:
  syntax_highlighter: rouge
theme: null
plugins:
  - jekyll-seo-tag
  - jekyll-sitemap

# --- Search Console / sitemap hygiene --------------------------------
# jekyll-sitemap lists every output .html by default. The Google
# verification token is an infrastructure file, not a page — it must stay
# reachable and byte-identical for verification, but listing it in the
# sitemap just adds a non-page URL to the "Pages" report. Keep it out.
# (Per-page noindex/sitemap opt-outs, e.g. search.html, live in each
# page's own front matter.)
defaults:
  - scope:
      path: "google844ded396fe38a5e.html"
    values:
      sitemap: false
  # Hand jekyll-seo-tag the brand OG/Twitter card image as a per-page
  # default (it does NOT auto-read the top-level `image:` key). With an
  # image present AND twitter.card=summary_large_image set above, seo-tag
  # now emits og:image + twitter:image + the large card itself — so the
  # manual override block in _layouts/default.html could be removed,
  # killing the previously duplicated twitter:card / og:image tags.
  - scope:
      path: ""
    values:
      image:
        path: /assets/images/og-image.png
        width: 1200
        height: 630
        alt: "Bowire — the multi-protocol API workbench. By Küstenlogik."

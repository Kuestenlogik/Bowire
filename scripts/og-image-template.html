<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<!--
  Open Graph card source for https://bowire.io. Rendered to a 1200×630
  PNG by scripts/generate-og-image.js (Playwright). Single source of truth
  for the social-media preview — bump the protocol pill list here, run the
  script, commit the regenerated site/assets/images/og-image.png.

  Inline CSS only; no external font fetches so the script runs offline.
  Falls back to system sans-serif if the host has no Inter installed.
-->
<style>
  :root {
    --bg-deep: #0d0d18;
    --bg-end:  #14142a;
    --text:    #ffffff;
    --text-sub:#94a3b8;
    --accent:  #6366f1;
    --accent-glow: rgba(99, 102, 241, 0.18);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    color: var(--text);
    background:
      radial-gradient(1100px 580px at 50% 35%, var(--accent-glow), transparent 70%),
      linear-gradient(180deg, var(--bg-deep) 0%, var(--bg-end) 100%);
  }

  .card {
    position: relative;
    width: 100%;
    height: 100%;
    padding: 56px 80px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .by-kl {
    position: absolute;
    top: 28px;
    right: 40px;
    color: var(--text-sub);
    font-size: 14px;
    letter-spacing: 0.04em;
  }
  .by-kl strong { color: var(--text); font-weight: 600; }

  .logo {
    width: 132px;
    height: 132px;
    margin-bottom: 28px;
    color: var(--text);
    filter: drop-shadow(0 18px 40px var(--accent-glow));
  }

  .tagline {
    font-size: 44px;
    font-weight: 700;
    letter-spacing: -0.015em;
    text-align: center;
    margin-bottom: 32px;
  }

  .protocols {
    color: var(--text-sub);
    font-size: 20px;
    font-weight: 500;
    text-align: center;
    line-height: 1.6;
    margin-bottom: 40px;
    max-width: 1040px;
  }
  .protocols .dot {
    color: var(--accent);
    margin: 0 8px;
    font-weight: 700;
  }

  .install {
    font-family: 'JetBrains Mono', 'Cascadia Code', Consolas, monospace;
    font-size: 18px;
    background: rgba(99, 102, 241, 0.08);
    border: 1px solid rgba(99, 102, 241, 0.32);
    color: var(--text);
    padding: 14px 28px;
    border-radius: 10px;
    letter-spacing: 0.005em;
  }
  .install .prompt {
    color: var(--accent);
    margin-right: 10px;
  }
</style>
</head>
<body>
  <div class="card">
    <span class="by-kl">by <strong>Küstenlogik</strong></span>

    <!-- Bowire mark: simplified "B + cable" using currentColor so a single
         element renders against the dark background. Recreated from the
         site's hero-logo with the cable loop omitted (the OG mark needs
         to scan-read at thumbnail size on a phone). -->
    <svg class="logo" viewBox="0 0 240 240" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-label="Bowire">
      <circle cx="120" cy="120" r="106" fill="none" stroke="currentColor" stroke-width="14"/>
      <path d="M82 70h36c19 0 32 11 32 28 0 11-5 18-15 22 13 4 20 13 20 27 0 19-14 30-35 30H82V70zm22 22v23h12c8 0 13-4 13-12 0-7-5-11-13-11h-12zm0 43v25h14c9 0 14-5 14-12 0-8-5-13-14-13h-14z"/>
    </svg>

    <div class="tagline">Multi-protocol API workbench for .NET</div>

    <div class="protocols">
      gRPC<span class="dot">·</span>REST<span class="dot">·</span>GraphQL<span class="dot">·</span>MQTT<span class="dot">·</span>SignalR<span class="dot">·</span>WebSocket<span class="dot">·</span>SSE<span class="dot">·</span>MCP<span class="dot">·</span>OData<span class="dot">·</span>Akka.NET<span class="dot">·</span>Surgewave<span class="dot">·</span>Kafka
    </div>

    <div class="install"><span class="prompt">$</span>dotnet tool install -g Kuestenlogik.Bowire.Tool</div>
  </div>
</body>
</html>

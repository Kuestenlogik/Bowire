<?xml version="1.0" encoding="UTF-8"?>
<!--
    Click-mapped anatomy of the Bowire workbench. Background image is
    the method-detail-dark capture; the four <a> overlays jump to the
    matching ui-guide sub-page. Theme parity is provided by the
    sibling ui-anatomy-light.svg + a CSS [data-theme] swap on the
    consuming page.
-->
<svg xmlns="http://www.w3.org/2000/svg"
     xmlns:xlink="http://www.w3.org/1999/xlink"
     viewBox="0 0 1280 720"
     role="img"
     aria-label="Bowire workbench layout — click any region to jump to its UI Guide page">
    <style>
        .region rect.box { fill: rgba(99,102,241,0.10); stroke: #6366f1; stroke-width: 3; transition: fill 0.15s ease, stroke 0.15s ease; }
        .region:hover rect.box { fill: rgba(99,102,241,0.28); stroke: #818cf8; }
        .region:focus rect.box { fill: rgba(99,102,241,0.32); stroke: #a5b4fc; outline: none; }
        .badge { fill: #6366f1; }
        .region:hover .badge { fill: #818cf8; }
        .badge-num { fill: #fff; font-family: -apple-system, "Segoe UI", Inter, system-ui, sans-serif; font-size: 18px; font-weight: 800; text-anchor: middle; dominant-baseline: central; }
        .badge-label { fill: #fff; font-family: -apple-system, "Segoe UI", Inter, system-ui, sans-serif; font-size: 16px; font-weight: 700; }
        .badge-sub { fill: rgba(255,255,255,0.85); font-family: -apple-system, "Segoe UI", Inter, system-ui, sans-serif; font-size: 12px; font-weight: 500; }
        .label-pill { fill: #6366f1; }
        .region:hover .label-pill { fill: #818cf8; }
    </style>

    <image href="bowire-method-detail-light.png" x="0" y="0" width="1280" height="720" />

    <!-- 1. Sidebar -->
    <a xlink:href="../ui-guide/sidebar.html" target="_top" class="region" aria-label="Sidebar">
        <rect class="box" x="2" y="2" width="321" height="716" rx="6" />
        <g transform="translate(28, 380)">
            <rect class="label-pill" x="-12" y="-22" width="160" height="44" rx="22" />
            <circle class="badge" cx="14" cy="0" r="18" />
            <text class="badge-num" x="14" y="0">1</text>
            <text class="badge-label" x="42" y="-3">Sidebar</text>
            <text class="badge-sub" x="42" y="14">services · search · favs</text>
        </g>
    </a>

    <!-- 2. Request Pane -->
    <a xlink:href="../ui-guide/request-pane.html" target="_top" class="region" aria-label="Request pane">
        <rect class="box" x="328" y="60" width="463" height="598" rx="6" />
        <g transform="translate(380, 350)">
            <rect class="label-pill" x="-12" y="-22" width="200" height="44" rx="22" />
            <circle class="badge" cx="14" cy="0" r="18" />
            <text class="badge-num" x="14" y="0">2</text>
            <text class="badge-label" x="42" y="-3">Request Pane</text>
            <text class="badge-sub" x="42" y="14">body · headers · code · scripts</text>
        </g>
    </a>

    <!-- 3. Response Pane -->
    <a xlink:href="../ui-guide/response-pane.html" target="_top" class="region" aria-label="Response pane">
        <rect class="box" x="796" y="60" width="480" height="598" rx="6" />
        <g transform="translate(848, 270)">
            <rect class="label-pill" x="-12" y="-22" width="210" height="44" rx="22" />
            <circle class="badge" cx="14" cy="0" r="18" />
            <text class="badge-num" x="14" y="0">3</text>
            <text class="badge-label" x="42" y="-3">Response Pane</text>
            <text class="badge-sub" x="42" y="14">result · metadata · perf · tests</text>
        </g>
    </a>

    <!-- 4. Action Bar -->
    <a xlink:href="../ui-guide/action-bar.html" target="_top" class="region" aria-label="Action bar">
        <rect class="box" x="328" y="662" width="950" height="56" rx="6" />
        <g transform="translate(530, 690)">
            <rect class="label-pill" x="-12" y="-22" width="180" height="44" rx="22" />
            <circle class="badge" cx="14" cy="0" r="18" />
            <text class="badge-num" x="14" y="0">4</text>
            <text class="badge-label" x="42" y="-3">Action Bar</text>
            <text class="badge-sub" x="42" y="14">execute · repeat · save · record</text>
        </g>
    </a>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<!--
  Social-share preview card for Bowire (1200×630 — the OpenGraph
  recommended size, Twitter Cards summary_large_image picks the same).
  Rendered to site/assets/images/og-image.png by scripts/generate-icons.sh.

  Brand mark is the freestanding B-in-circle from images/bowire_logo_small.svg —
  the same path geometry (path87 = ring + B negative space, path86 + path89 =
  B-bowl fills) so the social-share card carries the canonical Bowire mark
  rather than a one-off rounded-square tile.
-->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f0f17"/>
      <stop offset="1" stop-color="#1a1a2e"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Bowire B-in-circle brand mark — copied from images/bowire_logo_small.svg
       (path86 / path89 / path87). The inner translate undoes the original
       layer offset (-57.679684, -154.66912); the outer translate + scale
       places a 200×200-rendered logo into the social-card layout. -->
  <g transform="translate(96, 195) scale(2.103)">
    <g transform="translate(-57.679684,-154.66912)" fill="#6366f1">
      <path d="m 98.433779,206.65457 v 16.57418 h 7.672911 c 3.27394,0 5.83185,-0.75992 7.67344,-2.27997 1.87082,-1.52004 2.80603,-3.59565 2.80603,-6.22649 0,-2.51391 -0.92052,-4.48667 -2.76211,-5.91902 -1.81236,-1.43234 -4.35557,-2.1487 -7.62951,-2.1487 z"/>
      <path d="m 98.433779,181.22304 v 14.90814 h 6.225971 c 2.92316,0 5.21814,-0.70167 6.88434,-2.10478 1.69543,-1.43235 2.54299,-3.39093 2.54299,-5.87561 0,-4.61859 -3.44955,-6.92775 -10.3482,-6.92775 z"/>
      <path d="m 105.23698,154.66911 c -26.26504,-1.7e-4 -47.557183,21.29175 -47.557298,47.55679 -1.66e-4,26.26524 21.292058,47.55747 47.557298,47.5573 26.26504,-1.2e-4 47.55695,-21.29226 47.55678,-47.5573 -1.2e-4,-26.26484 -21.29194,-47.55667 -47.55678,-47.55679 z M 84.270824,170.7875 h 22.888516 c 7.01558,0 12.4085,1.28631 16.17937,3.85868 3.77088,2.57238 5.65651,6.19671 5.65651,10.87376 0,3.39086 -1.15458,6.35812 -3.46387,8.90126 -2.28007,2.54315 -5.20324,4.31175 -8.76949,5.30562 v 0.17519 c 4.47243,0.5554 8.03849,2.20696 10.69857,4.95473 2.6893,2.74777 4.03386,6.09499 4.03386,10.04125 0,5.75862 -2.06092,10.33336 -6.18257,13.72423 -4.12165,3.36163 -9.74863,5.04258 -16.88114,5.04258 H 84.270824 Z"/>
    </g>
  </g>

  <!-- Wordmark "Bowire" — large, bright, set with letter-spacing
       that matches the Inter Display brand setting elsewhere. -->
  <text x="340" y="290" fill="#ffffff" font-family="Inter, system-ui, -apple-system, sans-serif"
        font-size="100" font-weight="800" letter-spacing="-3">Bowire</text>

  <!-- Tagline: same line that runs as the hero subheading. Two lines
       for readability at preview-thumbnail sizes. -->
  <text x="340" y="370" fill="#cdd0e0" font-family="Inter, system-ui, sans-serif"
        font-size="32" font-weight="500">Multi-protocol API workbench for .NET</text>
  <text x="340" y="412" fill="#9ea3bd" font-family="Inter, system-ui, sans-serif"
        font-size="26" font-weight="400">gRPC · REST · GraphQL · MQTT · SignalR · WebSocket · SSE · MCP · OData</text>

  <!-- Bottom strip: install command + "by Küstenlogik" attribution. -->
  <rect x="96" y="500" width="1008" height="60" rx="14" fill="#1f1f33" stroke="#2a2a3d" stroke-width="1"/>
  <text x="120" y="538" fill="#a5b4fc" font-family="JetBrains Mono, ui-monospace, Consolas, monospace"
        font-size="22">$</text>
  <text x="146" y="538" fill="#e8e8f0" font-family="JetBrains Mono, ui-monospace, Consolas, monospace"
        font-size="22">dotnet tool install -g Kuestenlogik.Bowire.Tool</text>
  <text x="1080" y="538" fill="#9ea3bd" font-family="Inter, system-ui, sans-serif"
        font-size="18" font-weight="500" text-anchor="end">by Küstenlogik</text>
</svg>

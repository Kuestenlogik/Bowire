openapi: 3.0.3
info:
  title: Weather API
  version: 1.0.0
  description: Minimal OpenAPI schema fixture for the schema-only mock tests.
paths:
  /weather:
    get:
      operationId: getCurrent
      summary: Current weather for a location
      tags: [Weather]
      parameters:
        - name: location
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Weather'
  /weather/forecast:
    get:
      operationId: getForecast
      summary: Five-day forecast
      tags: [Weather]
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Weather'
  /admin/ping:
    get:
      operationId: ping
      summary: Liveness probe
      tags: [Admin]
      responses:
        '204':
          description: No content
components:
  schemas:
    Weather:
      type: object
      required: [temperature, condition, recordedAt]
      properties:
        temperature:
          type: integer
          minimum: -50
          description: Temperature in Celsius.
        condition:
          type: string
          enum: [sunny, cloudy, rainy, snowy]
        humidity:
          type: number
          minimum: 0
          maximum: 100
        recordedAt:
          type: string
          format: date-time

syntax = "proto3";
option csharp_namespace = "Kuestenlogik.Bowire.IntegrationTests";
package test;

service Greeter {
  rpc SayHello (HelloRequest) returns (HelloReply);
  rpc SayHelloStream (HelloRequest) returns (stream HelloReply);
}

message HelloRequest {
  string name = 1;
  int32 count = 2;
}

message HelloReply {
  string message = 1;
  int32 sequence = 2;
}

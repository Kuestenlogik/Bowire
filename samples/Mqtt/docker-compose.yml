# Eclipse Mosquitto MQTT broker for the Bowire MQTT plugin demo.
# Anonymous access on tcp/1883 + WebSocket on 9001 — sample-grade,
# do not point real production at this.
# Run: docker compose up
# Tear down: docker compose down -v
services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: bowire-mqtt
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
